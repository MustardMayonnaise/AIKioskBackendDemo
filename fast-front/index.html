<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fast Speech Console</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+KR:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="ambient ambient-one"></div>
    <div class="ambient ambient-two"></div>

    <main class="app">
      <header class="hero card reveal">
        <h1>Fast Speech Console</h1>
        <p>녹음과 TTS를 한 화면에서 처리하는 간단한 테스트 프론트입니다.</p>

        <div class="row api-row">
          <label for="apiBase">API 주소</label>
          <input id="apiBase" type="text" value="http://localhost:8000" />
          <button id="saveApiButton" type="button">저장</button>
        </div>
      </header>

      <section class="card reveal delay-1">
        <h2>STT: 녹음/업로드 → 텍스트</h2>

        <div class="row controls">
          <button id="startRecordButton" type="button">녹음 시작</button>
          <button id="stopRecordButton" type="button" disabled>녹음 중지</button>
          <button id="sendRecordButton" type="button" disabled>녹음 전송</button>
        </div>

        <div class="row">
          <label for="audioFileInput" class="file-label">파일 업로드</label>
          <input id="audioFileInput" type="file" accept="audio/*" />
          <button id="sendFileButton" type="button" disabled>파일 전송</button>
        </div>

        <audio id="sttAudioPreview" controls></audio>

        <label for="sttResult">인식 결과</label>
        <textarea id="sttResult" rows="5" readonly placeholder="여기에 STT 결과가 표시됩니다."></textarea>
      </section>

      <section class="card reveal delay-2">
        <h2>TTS: 텍스트 → 음성</h2>

        <label for="ttsInput">변환할 텍스트</label>
        <textarea id="ttsInput" rows="5" placeholder="읽을 문장을 입력하세요."></textarea>

        <div class="row controls">
          <button id="synthesizeButton" type="button">음성 생성</button>
        </div>

        <audio id="ttsAudioPlayer" controls></audio>
      </section>

      <section class="card reveal delay-3">
        <h2>상태</h2>
        <p id="statusText">대기 중</p>
        <p class="hint">fetch는 기본적으로 타임아웃이 없어 CPU 환경에서 오래 걸려도 완료까지 대기합니다.</p>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
